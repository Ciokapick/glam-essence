
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finalizare comandă - GlamEssence</title>
    <meta name="description" content="Finalizează comanda de produse GlamEssence." />
    <meta name="author" content="GlamEssence" />
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  </head>

  <body>
    <div id="app">
      <div class="checkout-wrapper">
        <div class="container">
          <button type="button" class="checkout-back-btn" onclick="window.location.href='index.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
              <path d="M19 12H5m0 0l7-7m-7 7l7 7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Înapoi la magazin
          </button>
          
          <h1 class="checkout-title">Finalizare comandă</h1>
          
          <div class="checkout-container">
            <div class="checkout-form-container">
              <form id="checkoutForm" class="checkout-form">
                <div class="checkout-section">
                  <h2 class="checkout-section-title">Informații personale</h2>
                  
                  <div class="checkout-form-group">
                    <label for="customerName">Nume complet</label>
                    <input type="text" id="customerName" class="checkout-input" required>
                  </div>
                  
                  <div class="checkout-form-group">
                    <label for="customerEmail">Email</label>
                    <input type="email" id="customerEmail" class="checkout-input" required>
                  </div>
                  
                  <div class="checkout-form-group">
                    <label for="customerPhone">Telefon</label>
                    <input type="tel" id="customerPhone" class="checkout-input" required>
                  </div>
                </div>
                
                <div class="checkout-section">
                  <h2 class="checkout-section-title">Adresă de livrare</h2>
                  
                  <div class="checkout-form-group">
                    <label for="customerAddress">Adresa completă</label>
                    <textarea id="customerAddress" class="checkout-input checkout-textarea" rows="3" required></textarea>
                  </div>
                </div>
                
                <div class="checkout-section">
                  <h2 class="checkout-section-title">Metodă de plată</h2>
                  
                  <div class="checkout-payment-methods">
                    <div class="checkout-payment-method">
                      <input type="radio" name="paymentMethod" id="paymentCash" checked>
                      <label for="paymentCash">
                        <span class="payment-icon">💵</span>
                        <div>
                          <span class="payment-name">Ramburs</span>
                          <span class="payment-description">Plata la livrare</span>
                        </div>
                      </label>
                    </div>
                    
                    <div class="checkout-payment-method">
                      <input type="radio" name="paymentMethod" id="paymentCard">
                      <label for="paymentCard">
                        <span class="payment-icon">💳</span>
                        <div>
                          <span class="payment-name">Card bancar</span>
                          <span class="payment-description">Plata online securizată</span>
                        </div>
                      </label>
                    </div>
                  </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block checkout-submit-btn">
                  Plasează comanda
                </button>
              </form>
            </div>
            
            <div class="checkout-summary-container">
              <div class="checkout-summary">
                <h2 class="checkout-section-title">Produse comandate</h2>
                
                <div id="checkoutItems" class="checkout-items">
                  <!-- Cart items will be loaded dynamically -->
                </div>
                
                <div id="checkoutTotal" class="checkout-total">
                  <!-- Order total will be loaded dynamically -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Toast Notifications -->
      <div id="toast" class="toast"></div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/main.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const checkoutForm = document.getElementById('checkoutForm');
        const checkoutItems = document.getElementById('checkoutItems');
        const checkoutTotal = document.getElementById('checkoutTotal');
        
        // Initialize database
        initializeDb();
        
        // Check if cart is empty
        const cart = getCart();
        if (cart.length === 0) {
          // Redirect to home page
          window.location.href = 'index.html';
          return;
        }
        
        // Render cart items
        renderCheckoutItems();
        
        // Event listeners
        checkoutForm.addEventListener('submit', handleFormSubmit);
        
        // Render checkout items
        function renderCheckoutItems() {
          const cart = getCart();
          
          checkoutItems.innerHTML = cart.map(item => `
            <div class="checkout-item">
              <div class="checkout-item-image-container">
                <img src="${item.image}" alt="${item.name}" class="checkout-item-image">
              </div>
              <div class="checkout-item-details">
                <h3 class="checkout-item-name">${item.name}</h3>
                <div class="checkout-item-meta">
                  <span class="checkout-item-price">${formatPrice(calculateDiscountedPrice(item.price, item.discount))}</span>
                  <span class="checkout-item-quantity">x ${item.quantity}</span>
                </div>
              </div>
              <div class="checkout-item-total">
                ${formatPrice(calculateDiscountedPrice(item.price, item.discount) * item.quantity)}
              </div>
            </div>
          `).join('');
          
          const subtotal = getCartTotal();
          const shipping = 15;
          const total = subtotal + shipping;
          
          checkoutTotal.innerHTML = `
            <div class="checkout-total-row">
              <span>Subtotal:</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="checkout-total-row">
              <span>Transport:</span>
              <span>${formatPrice(shipping)}</span>
            </div>
            <div class="checkout-total-row checkout-grand-total">
              <span>Total:</span>
              <span>${formatPrice(total)}</span>
            </div>
          `;
        }
        
        // Handle form submit
        function handleFormSubmit(e) {
          e.preventDefault();
          
          // Get form data
          const name = document.getElementById('customerName').value;
          const email = document.getElementById('customerEmail').value;
          const phone = document.getElementById('customerPhone').value;
          const address = document.getElementById('customerAddress').value;
          const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').id;
          
          // Validate form
          if (!name || !email || !phone || !address) {
            showToast('Toate câmpurile sunt obligatorii', 'error');
            return;
          }
          
          // Create order
          const cart = getCart();
          const subtotal = getCartTotal();
          const shipping = 15;
          const total = subtotal + shipping;
          
          const order = {
            id: generateOrderId(),
            customer: {
              name,
              email,
              phone,
              address
            },
            items: cart,
            paymentMethod: paymentMethod === 'paymentCash' ? 'cash' : 'card',
            subtotal,
            shipping,
            total,
            status: 'pending',
            date: new Date().toLocaleDateString('ro-RO')
          };
          
          // Save order
          try {
            saveOrder(order);
            
            // Show success message
            showToast('Comandă plasată cu succes!');
            
            // Clear cart
            clearCart();
            
            // Redirect to thank you page or home
            setTimeout(function() {
              window.location.href = 'index.html';
            }, 2000);
          } catch (error) {
            console.error('Error saving order:', error);
            showToast('A apărut o eroare. Vă rugăm încercați din nou.', 'error');
          }
        }
        
        // Generate order ID
        function generateOrderId() {
          // Simple 4-digit order ID
          return String(1000 + Math.floor(Math.random() * 9000));
        }
      });
    </script>
    <style>
      .checkout-wrapper {
        min-height: 100vh;
        background-color: var(--background-muted);
        padding: var(--spacing-lg) 0;
      }
      
      .checkout-back-btn {
        display: inline-flex;
        align-items: center;
        gap: var(--spacing-xs);
        color: var(--beauty-magenta);
        background: none;
        border: none;
        padding: 0;
        margin-bottom: var(--spacing-lg);
        cursor: pointer;
        font-weight: 500;
      }
      
      .checkout-back-btn:hover {
        text-decoration: underline;
      }
      
      .checkout-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: var(--spacing-xl);
      }
      
      .checkout-container {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--spacing-xl);
      }
      
      .checkout-form-container {
        order: 2;
      }
      
      .checkout-summary-container {
        order: 1;
      }
      
      .checkout-form {
        background-color: white;
        border-radius: var(--radius-lg);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        padding: var(--spacing-lg);
      }
      
      .checkout-section {
        margin-bottom: var(--spacing-xl);
      }
      
      .checkout-section-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: var(--spacing-lg);
      }
      
      .checkout-form-group {
        margin-bottom: var(--spacing-md);
      }
      
      .checkout-form-group label {
        display: block;
        margin-bottom: var(--spacing-xs);
        font-weight: 500;
      }
      
      .checkout-input {
        width: 100%;
        padding: var(--spacing-md);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
      }
      
      .checkout-input:focus {
        outline: none;
        border-color: var(--beauty-magenta);
        box-shadow: 0 0 0 2px var(--beauty-magenta-light);
      }
      
      .checkout-textarea {
        resize: vertical;
        min-height: 100px;
      }
      
      .checkout-payment-methods {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
        margin-bottom: var(--spacing-lg);
      }
      
      .checkout-payment-method {
        position: relative;
      }
      
      .checkout-payment-method input[type="radio"] {
        position: absolute;
        opacity: 0;
      }
      
      .checkout-payment-method label {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
        padding: var(--spacing-md);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.2s;
      }
      
      .checkout-payment-method input[type="radio"]:checked + label {
        border-color: var(--beauty-magenta);
        background-color: var(--beauty-magenta-light);
      }
      
      .payment-icon {
        font-size: 1.5rem;
        line-height: 1;
      }
      
      .payment-name {
        display: block;
        font-weight: 500;
      }
      
      .payment-description {
        display: block;
        font-size: 0.875rem;
        color: var(--text-muted);
      }
      
      .checkout-submit-btn {
        margin-top: var(--spacing-lg);
      }
      
      .checkout-summary {
        background-color: white;
        border-radius: var(--radius-lg);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        padding: var(--spacing-lg);
      }
      
      .checkout-items {
        margin-bottom: var(--spacing-lg);
      }
      
      .checkout-item {
        display: flex;
        align-items: center;
        padding: var(--spacing-sm) 0;
        border-bottom: 1px solid var(--border);
      }
      
      .checkout-item:last-child {
        border-bottom: none;
      }
      
      .checkout-item-image-container {
        width: 60px;
        height: 60px;
        margin-right: var(--spacing-md);
      }
      
      .checkout-item-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: var(--radius-sm);
      }
      
      .checkout-item-details {
        flex: 1;
      }
      
      .checkout-item-name {
        font-size: 1rem;
        font-weight: 500;
        margin-bottom: var(--spacing-xs);
      }
      
      .checkout-item-meta {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
        color: var(--text-muted);
        font-size: 0.875rem;
      }
      
      .checkout-item-price {
        color: var(--text-secondary);
      }
      
      .checkout-item-total {
        font-weight: 500;
      }
      
      .checkout-total {
        padding-top: var(--spacing-md);
        border-top: 1px solid var(--border);
      }
      
      .checkout-total-row {
        display: flex;
        justify-content: space-between;
        padding: var(--spacing-xs) 0;
      }
      
      .checkout-grand-total {
        font-size: 1.125rem;
        font-weight: 700;
        padding-top: var(--spacing-sm);
        margin-top: var(--spacing-xs);
        border-top: 1px solid var(--border);
      }
      
      @media (min-width: 992px) {
        .checkout-container {
          grid-template-columns: 2fr 1fr;
        }
        
        .checkout-form-container {
          order: 1;
        }
        
        .checkout-summary-container {
          order: 2;
        }
      }
    </style>
  </body>
</html>
