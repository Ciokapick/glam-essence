
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - GlamEssence</title>
    <meta name="description" content="Admin dashboard for GlamEssence." />
    <meta name="author" content="GlamEssence" />
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin-styles.css">
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  </head>

  <body>
    <div id="app" class="admin-layout">
      <!-- Admin Sidebar -->
      <div class="admin-sidebar">
        <div class="admin-sidebar-header">
          <a href="dashboard.html" class="admin-sidebar-logo">GlamEssence</a>
        </div>
        
        <nav class="admin-sidebar-nav">
          <ul class="admin-sidebar-nav-list">
            <li>
              <a href="dashboard.html" class="admin-sidebar-nav-link active">
                <span class="admin-sidebar-nav-icon">📊</span>
                <span>Dashboard</span>
              </a>
            </li>
            <li>
              <a href="products.html" class="admin-sidebar-nav-link">
                <span class="admin-sidebar-nav-icon">📦</span>
                <span>Products</span>
              </a>
            </li>
            <li>
              <a href="orders.html" class="admin-sidebar-nav-link">
                <span class="admin-sidebar-nav-icon">🛒</span>
                <span>Orders</span>
              </a>
            </li>
          </ul>
        </nav>
        
        <div class="admin-sidebar-footer">
          <button id="logoutBtn" class="admin-sidebar-logout">
            <span class="admin-sidebar-nav-icon">🚪</span>
            <span>Logout</span>
          </button>
        </div>
      </div>
      
      <!-- Admin Content -->
      <div class="admin-content">
        <header class="admin-header">
          <h1 class="admin-header-title">Dashboard</h1>
        </header>
        
        <div class="admin-dashboard-cards">
          <div class="admin-dashboard-card">
            <div class="admin-dashboard-card-icon" style="background-color: rgba(217, 70, 239, 0.1); color: var(--beauty-magenta);">📦</div>
            <div>
              <p class="admin-dashboard-card-number" id="totalProducts">0</p>
              <p class="admin-dashboard-card-label">Products</p>
            </div>
          </div>
          
          <div class="admin-dashboard-card">
            <div class="admin-dashboard-card-icon" style="background-color: rgba(245, 158, 11, 0.1); color: rgb(245, 158, 11);">🛒</div>
            <div>
              <p class="admin-dashboard-card-number" id="totalOrders">0</p>
              <p class="admin-dashboard-card-label">Orders</p>
            </div>
          </div>
          
          <div class="admin-dashboard-card">
            <div class="admin-dashboard-card-icon" style="background-color: rgba(16, 185, 129, 0.1); color: rgb(16, 185, 129);">💰</div>
            <div>
              <p class="admin-dashboard-card-number" id="totalRevenue">0 RON</p>
              <p class="admin-dashboard-card-label">Revenue</p>
            </div>
          </div>
          
          <div class="admin-dashboard-card">
            <div class="admin-dashboard-card-icon" style="background-color: rgba(239, 68, 68, 0.1); color: rgb(239, 68, 68);">⚠️</div>
            <div>
              <p class="admin-dashboard-card-number" id="lowStockCount">0</p>
              <p class="admin-dashboard-card-label">Low Stock Items</p>
            </div>
          </div>
        </div>
        
        <div class="admin-dashboard-grid">
          <div class="admin-dashboard-widget">
            <div class="admin-dashboard-widget-header">
              <h3>Recent Orders</h3>
              <a href="orders.html" class="admin-dashboard-widget-link">View All</a>
            </div>
            <div class="admin-dashboard-widget-content">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Amount</th>
                  </tr>
                </thead>
                <tbody id="recentOrders">
                  <tr>
                    <td colspan="5" class="admin-table-empty">No orders found</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          
          <div class="admin-dashboard-widget">
            <div class="admin-dashboard-widget-header">
              <h3>Low Stock Products</h3>
              <a href="products.html" class="admin-dashboard-widget-link">View All</a>
            </div>
            <div class="admin-dashboard-widget-content">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Stock</th>
                    <th>Price</th>
                  </tr>
                </thead>
                <tbody id="lowStockProducts">
                  <tr>
                    <td colspan="4" class="admin-table-empty">No low stock products</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Toast Notifications -->
      <div id="toast" class="toast"></div>
    </div>

    <script src="../js/database.js"></script>
    <script src="admin.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Check admin authentication
        if (!checkAdminAuth()) return;
        
        // DOM elements
        const totalProductsEl = document.getElementById('totalProducts');
        const totalOrdersEl = document.getElementById('totalOrders');
        const totalRevenueEl = document.getElementById('totalRevenue');
        const lowStockCountEl = document.getElementById('lowStockCount');
        const recentOrdersEl = document.getElementById('recentOrders');
        const lowStockProductsEl = document.getElementById('lowStockProducts');
        const logoutBtn = document.getElementById('logoutBtn');
        
        // Initialize database
        initializeDb();
        
        // Load dashboard data
        loadDashboardData();
        
        // Event listeners
        logoutBtn.addEventListener('click', adminLogout);
        
        // Load dashboard data
        function loadDashboardData() {
          // Get data
          const products = getAllProducts();
          const orders = getAllOrders();
          
          // Calculate metrics
          const productCount = Object.keys(products).length;
          const orderCount = orders.length;
          const revenue = calculateTotalRevenue(orders);
          const lowStockItems = getLowStockItems(products);
          
          // Update DOM
          totalProductsEl.textContent = productCount;
          totalOrdersEl.textContent = orderCount;
          totalRevenueEl.textContent = formatPrice(revenue);
          lowStockCountEl.textContent = lowStockItems.length;
          
          // Recent orders
          renderRecentOrders(orders);
          
          // Low stock products
          renderLowStockProducts(lowStockItems);
        }
        
        // Calculate total revenue
        function calculateTotalRevenue(orders) {
          return orders.reduce((total, order) => total + order.total, 0);
        }
        
        // Get low stock items
        function getLowStockItems(products) {
          return Object.values(products).filter(product => product.stock < 5);
        }
        
        // Render recent orders
        function renderRecentOrders(orders) {
          if (orders.length === 0) {
            recentOrdersEl.innerHTML = '<tr><td colspan="5" class="admin-table-empty">No orders found</td></tr>';
            return;
          }
          
          // Get 5 most recent orders
          const recentOrders = orders.slice(0, 5);
          
          recentOrdersEl.innerHTML = recentOrders.map(order => `
            <tr>
              <td>#${order.id}</td>
              <td>${order.customer.name}</td>
              <td>${order.date}</td>
              <td><span class="admin-badge ${getStatusBadgeClass(order.status)}">${order.status}</span></td>
              <td>${formatPrice(order.total)}</td>
            </tr>
          `).join('');
        }
        
        // Render low stock products
        function renderLowStockProducts(products) {
          if (products.length === 0) {
            lowStockProductsEl.innerHTML = '<tr><td colspan="4" class="admin-table-empty">No low stock products</td></tr>';
            return;
          }
          
          // Get 5 lowest stock products
          const lowStockProducts = products.slice(0, 5);
          
          lowStockProductsEl.innerHTML = lowStockProducts.map(product => `
            <tr>
              <td class="admin-table-product">
                <img src="${product.image}" alt="${product.name}" class="admin-table-product-image">
                ${product.name}
              </td>
              <td>${product.category}</td>
              <td><span class="admin-badge admin-badge-danger">${product.stock}</span></td>
              <td>${formatPrice(product.price)}</td>
            </tr>
          `).join('');
        }
      });
    </script>
  </body>
</html>
