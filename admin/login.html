
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - GlamEssence</title>
    <meta name="description" content="Admin login for GlamEssence." />
    <meta name="author" content="GlamEssence" />
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  </head>

  <body>
    <div id="app">
      <div class="admin-login">
        <div class="admin-login-container">
          <div class="admin-login-header">
            <a href="../index.html" class="admin-login-logo">GlamEssence</a>
            <h1 class="admin-login-title">Admin Login</h1>
          </div>
          
          <form id="adminLoginForm" class="admin-login-form">
            <div class="admin-login-input-group">
              <label for="adminEmail">Email</label>
              <input type="email" id="adminEmail" placeholder="admin@example.com" class="admin-login-input" required>
            </div>
            
            <div class="admin-login-input-group">
              <label for="adminPassword">Password</label>
              <input type="password" id="adminPassword" placeholder="••••••••" class="admin-login-input" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Login</button>
          </form>
          
          <div class="admin-login-footer">
            <p>Demo credentials: admin@example.com / admin123</p>
            <a href="../index.html">Back to store</a>
          </div>
        </div>
      </div>
      
      <!-- Toast Notifications -->
      <div id="toast" class="toast"></div>
    </div>

    <script src="../js/database.js"></script>
    <script src="admin.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const adminLoginForm = document.getElementById('adminLoginForm');
        const adminEmail = document.getElementById('adminEmail');
        const adminPassword = document.getElementById('adminPassword');
        
        adminLoginForm.addEventListener('submit', function(e) {
          e.preventDefault();
          
          // For demo purposes, hardcoded credentials
          if (adminEmail.value === 'admin@example.com' && adminPassword.value === 'admin123') {
            // Set admin auth in localStorage
            localStorage.setItem('adminAuth', 'true');
            
            // Show success message
            showToast('Login successful');
            
            // Redirect to admin dashboard
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 1000);
          } else {
            showToast('Invalid email or password', 'error');
          }
        });
      });
    </script>
    <style>
      .admin-login {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--background-muted);
        padding: var(--spacing-md);
      }
      
      .admin-login-container {
        width: 100%;
        max-width: 400px;
        background-color: var(--card-bg);
        border-radius: var(--radius-lg);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        padding: var(--spacing-xl);
      }
      
      .admin-login-header {
        text-align: center;
        margin-bottom: var(--spacing-xl);
      }
      
      .admin-login-logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--beauty-magenta);
        display: block;
        margin-bottom: var(--spacing-md);
      }
      
      .admin-login-title {
        font-size: 1.5rem;
        font-weight: 700;
      }
      
      .admin-login-form {
        margin-bottom: var(--spacing-lg);
      }
      
      .admin-login-input-group {
        margin-bottom: var(--spacing-md);
      }
      
      .admin-login-input-group label {
        display: block;
        margin-bottom: var(--spacing-sm);
        font-weight: 500;
      }
      
      .admin-login-input {
        width: 100%;
        padding: var(--spacing-md);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
      }
      
      .admin-login-input:focus {
        outline: none;
        border-color: var(--beauty-magenta);
        box-shadow: 0 0 0 2px var(--beauty-magenta-light);
      }
      
      .admin-login-footer {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.875rem;
      }
      
      .admin-login-footer a {
        color: var(--beauty-magenta);
        text-decoration: none;
        margin-top: var(--spacing-md);
        display: block;
      }
    </style>
  </body>
</html>
