
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Products - GlamEssence</title>
    <meta name="description" content="Admin product management for GlamEssence." />
    <meta name="author" content="GlamEssence" />
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin-styles.css">
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  </head>

  <body>
    <div id="app" class="admin-layout">
      <!-- Admin Sidebar -->
      <div class="admin-sidebar">
        <div class="admin-sidebar-header">
          <a href="dashboard.html" class="admin-sidebar-logo">GlamEssence</a>
        </div>
        
        <nav class="admin-sidebar-nav">
          <ul class="admin-sidebar-nav-list">
            <li>
              <a href="dashboard.html" class="admin-sidebar-nav-link">
                <span class="admin-sidebar-nav-icon">📊</span>
                <span>Dashboard</span>
              </a>
            </li>
            <li>
              <a href="products.html" class="admin-sidebar-nav-link active">
                <span class="admin-sidebar-nav-icon">📦</span>
                <span>Products</span>
              </a>
            </li>
            <li>
              <a href="orders.html" class="admin-sidebar-nav-link">
                <span class="admin-sidebar-nav-icon">🛒</span>
                <span>Orders</span>
              </a>
            </li>
          </ul>
        </nav>
        
        <div class="admin-sidebar-footer">
          <button id="logoutBtn" class="admin-sidebar-logout">
            <span class="admin-sidebar-nav-icon">🚪</span>
            <span>Logout</span>
          </button>
        </div>
      </div>
      
      <!-- Admin Content -->
      <div class="admin-content">
        <div class="admin-products-header">
          <h1 class="admin-header-title">Manage Products</h1>
          <div class="admin-header-actions">
            <button id="addProductBtn" class="admin-header-btn">Add New Product</button>
          </div>
        </div>
        
        <div class="admin-products-actions">
          <div class="admin-products-search">
            <input type="text" id="searchInput" placeholder="Search products..." class="admin-products-search-input">
          </div>
          
          <div class="admin-products-category-filter">
            <label for="categoryFilter">Category:</label>
            <select id="categoryFilter" class="admin-filter-select">
              <option value="all">All Categories</option>
              <option value="parfumuri">Parfumuri</option>
              <option value="creme">Creme</option>
              <option value="ingrijire">Îngrijire</option>
            </select>
          </div>
        </div>
        
        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productsTable">
              <!-- Products will be loaded dynamically -->
              <tr>
                <td colspan="5" class="admin-table-empty">Loading products...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- Add/Edit Product Modal -->
      <div id="productModal" class="admin-modal">
        <div class="admin-modal-content">
          <div class="admin-modal-header">
            <h2 id="modalTitle" class="admin-modal-title">Add New Product</h2>
            <button id="closeModalBtn" class="admin-modal-close">&times;</button>
          </div>
          <div class="admin-modal-body">
            <form id="productForm" class="admin-form">
              <input type="hidden" id="productId">
              <input type="hidden" id="productSlug">
              
              <div class="admin-form-group">
                <label for="productName">Product Name</label>
                <input type="text" id="productName" class="admin-form-input" required>
              </div>
              
              <div class="admin-form-group">
                <label for="productDescription">Description</label>
                <textarea id="productDescription" class="admin-form-input" rows="3" required></textarea>
              </div>
              
              <div class="admin-form-group">
                <label for="productPrice">Price (RON)</label>
                <input type="number" id="productPrice" class="admin-form-input" min="0" step="0.01" required>
              </div>
              
              <div class="admin-form-group">
                <label for="productStock">Stock</label>
                <input type="number" id="productStock" class="admin-form-input" min="0" step="1" required>
              </div>
              
              <div class="admin-form-group">
                <label for="productCategory">Category</label>
                <select id="productCategory" class="admin-form-input" required>
                  <option value="parfumuri">Parfumuri</option>
                  <option value="creme">Creme</option>
                  <option value="ingrijire">Îngrijire</option>
                </select>
              </div>
              
              <div class="admin-form-group">
                <label for="productImage">Image URL</label>
                <input type="url" id="productImage" class="admin-form-input" required>
              </div>
              
              <div class="admin-form-group">
                <label for="productDiscount">Discount (%) - Optional</label>
                <input type="number" id="productDiscount" class="admin-form-input" min="0" max="100" step="1">
              </div>
              
              <div class="admin-form-group">
                <label>
                  <input type="checkbox" id="productIsNew">
                  Mark as New Product
                </label>
              </div>
            </form>
          </div>
          <div class="admin-modal-footer">
            <button type="button" id="cancelBtn" class="btn btn-outline">Cancel</button>
            <button type="button" id="saveProductBtn" class="btn btn-primary">Save Product</button>
          </div>
        </div>
      </div>
      
      <!-- Delete Confirmation Modal -->
      <div id="deleteModal" class="admin-modal">
        <div class="admin-modal-content">
          <div class="admin-modal-header">
            <h2 class="admin-modal-title">Delete Product</h2>
            <button id="closeDeleteModalBtn" class="admin-modal-close">&times;</button>
          </div>
          <div class="admin-modal-body">
            <p>Are you sure you want to delete this product? This action cannot be undone.</p>
            <input type="hidden" id="deleteProductSlug">
          </div>
          <div class="admin-modal-footer">
            <button type="button" id="cancelDeleteBtn" class="btn btn-outline">Cancel</button>
            <button type="button" id="confirmDeleteBtn" class="btn btn-primary">Delete Product</button>
          </div>
        </div>
      </div>
      
      <!-- Overlay -->
      <div id="overlay" class="overlay"></div>
      
      <!-- Toast Notifications -->
      <div id="toast" class="toast"></div>
    </div>

    <script src="../js/database.js"></script>
    <script src="admin.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Check admin authentication
        if (!checkAdminAuth()) return;
        
        // DOM elements
        const productsTable = document.getElementById('productsTable');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const addProductBtn = document.getElementById('addProductBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        
        // Product modal elements
        const productModal = document.getElementById('productModal');
        const modalTitle = document.getElementById('modalTitle');
        const productForm = document.getElementById('productForm');
        const productId = document.getElementById('productId');
        const productSlug = document.getElementById('productSlug');
        const productName = document.getElementById('productName');
        const productDescription = document.getElementById('productDescription');
        const productPrice = document.getElementById('productPrice');
        const productStock = document.getElementById('productStock');
        const productCategory = document.getElementById('productCategory');
        const productImage = document.getElementById('productImage');
        const productDiscount = document.getElementById('productDiscount');
        const productIsNew = document.getElementById('productIsNew');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const saveProductBtn = document.getElementById('saveProductBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        
        // Delete modal elements
        const deleteModal = document.getElementById('deleteModal');
        const deleteProductSlug = document.getElementById('deleteProductSlug');
        const closeDeleteModalBtn = document.getElementById('closeDeleteModalBtn');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        
        // Overlay
        const overlay = document.getElementById('overlay');
        
        // Initialize database
        initializeDb();
        
        // Load products
        loadProducts();
        
        // Event listeners
        logoutBtn.addEventListener('click', adminLogout);
        searchInput.addEventListener('input', loadProducts);
        categoryFilter.addEventListener('change', loadProducts);
        addProductBtn.addEventListener('click', showAddProductModal);
        closeModalBtn.addEventListener('click', closeProductModal);
        cancelBtn.addEventListener('click', closeProductModal);
        saveProductBtn.addEventListener('click', saveProduct);
        closeDeleteModalBtn.addEventListener('click', closeDeleteModal);
        cancelDeleteBtn.addEventListener('click', closeDeleteModal);
        confirmDeleteBtn.addEventListener('click', deleteProductConfirmed);
        
        // Load products
        function loadProducts() {
          const searchTerm = searchInput.value.toLowerCase();
          const categoryValue = categoryFilter.value;
          const allProducts = getAllProducts();
          
          let filteredProducts = Object.entries(allProducts).filter(([slug, product]) => {
            // Filter by search term
            const matchesSearch = product.name.toLowerCase().includes(searchTerm) || 
                                  product.description.toLowerCase().includes(searchTerm);
            
            // Filter by category
            const matchesCategory = categoryValue === 'all' || product.category === categoryValue;
            
            return matchesSearch && matchesCategory;
          });
          
          if (filteredProducts.length === 0) {
            productsTable.innerHTML = '<tr><td colspan="5" class="admin-table-empty">No products found</td></tr>';
            return;
          }
          
          productsTable.innerHTML = filteredProducts.map(([slug, product]) => `
            <tr>
              <td class="admin-table-product">
                <img src="${product.image}" alt="${product.name}" class="admin-table-product-image">
                ${product.name}
              </td>
              <td>${product.category}</td>
              <td>
                ${product.discount ? 
                  `<span class="product-price-original">${formatPrice(product.price)}</span> 
                   <span class="product-price">${formatPrice(product.price * (1 - product.discount / 100))}</span>` : 
                  formatPrice(product.price)}
              </td>
              <td>
                <span class="admin-badge ${product.stock < 5 ? 'admin-badge-danger' : 'admin-badge-success'}">${product.stock}</span>
              </td>
              <td>
                <button class="btn btn-outline btn-sm edit-product-btn" data-slug="${slug}">Edit</button>
                <button class="btn btn-outline btn-sm delete-product-btn" data-slug="${slug}">Delete</button>
              </td>
            </tr>
          `).join('');
          
          // Add event listeners to edit and delete buttons
          document.querySelectorAll('.edit-product-btn').forEach(button => {
            button.addEventListener('click', function() {
              const productSlug = this.dataset.slug;
              showEditProductModal(productSlug);
            });
          });
          
          document.querySelectorAll('.delete-product-btn').forEach(button => {
            button.addEventListener('click', function() {
              const productSlug = this.dataset.slug;
              showDeleteProductModal(productSlug);
            });
          });
        }
        
        // Show add product modal
        function showAddProductModal() {
          modalTitle.textContent = 'Add New Product';
          productForm.reset();
          productId.value = '';
          productSlug.value = '';
          
          productModal.classList.add('active');
          overlay.classList.add('active');
        }
        
        // Show edit product modal
        function showEditProductModal(slug) {
          const allProducts = getAllProducts();
          const product = allProducts[slug];
          
          if (!product) {
            showToast('Product not found', 'error');
            return;
          }
          
          modalTitle.textContent = 'Edit Product';
          
          productId.value = product.id;
          productSlug.value = slug;
          productName.value = product.name;
          productDescription.value = product.description;
          productPrice.value = product.price;
          productStock.value = product.stock;
          productCategory.value = product.category;
          productImage.value = product.image;
          productDiscount.value = product.discount || '';
          productIsNew.checked = product.isNew || false;
          
          productModal.classList.add('active');
          overlay.classList.add('active');
        }
        
        // Close product modal
        function closeProductModal() {
          productModal.classList.remove('active');
          overlay.classList.remove('active');
        }
        
        // Show delete product modal
        function showDeleteProductModal(slug) {
          deleteProductSlug.value = slug;
          deleteModal.classList.add('active');
          overlay.classList.add('active');
        }
        
        // Close delete modal
        function closeDeleteModal() {
          deleteModal.classList.remove('active');
          overlay.classList.remove('active');
        }
        
        // Save product
        function saveProduct() {
          // Validate form
          if (!productForm.checkValidity()) {
            productForm.reportValidity();
            return;
          }
          
          // Get form data
          const formData = {
            id: productId.value || String(Date.now()), // Generate new ID if adding
            name: productName.value,
            description: productDescription.value,
            price: parseFloat(productPrice.value),
            stock: parseInt(productStock.value),
            category: productCategory.value,
            image: productImage.value
          };
          
          // Optional fields
          if (productDiscount.value) {
            formData.discount = parseInt(productDiscount.value);
          }
          
          if (productIsNew.checked) {
            formData.isNew = true;
          }
          
          // Check if adding or editing
          if (productSlug.value) {
            // Editing existing product
            const result = updateProduct(productSlug.value, formData);
            if (result) {
              closeProductModal();
              loadProducts();
            }
          } else {
            // Adding new product
            const result = addProduct(formData);
            if (result) {
              closeProductModal();
              loadProducts();
            }
          }
        }
        
        // Delete product confirmed
        function deleteProductConfirmed() {
          const slug = deleteProductSlug.value;
          
          if (!slug) {
            showToast('Product not found', 'error');
            closeDeleteModal();
            return;
          }
          
          const result = deleteProduct(slug);
          
          if (result) {
            closeDeleteModal();
            loadProducts();
          }
        }
      });
    </script>
  </body>
</html>
