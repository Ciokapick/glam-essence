
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Orders - GlamEssence</title>
    <meta name="description" content="Admin order management for GlamEssence." />
    <meta name="author" content="GlamEssence" />
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin-styles.css">
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  </head>

  <body>
    <div id="app" class="admin-layout">
      <!-- Admin Sidebar -->
      <div class="admin-sidebar">
        <div class="admin-sidebar-header">
          <a href="dashboard.html" class="admin-sidebar-logo">GlamEssence</a>
        </div>
        
        <nav class="admin-sidebar-nav">
          <ul class="admin-sidebar-nav-list">
            <li>
              <a href="dashboard.html" class="admin-sidebar-nav-link">
                <span class="admin-sidebar-nav-icon">📊</span>
                <span>Dashboard</span>
              </a>
            </li>
            <li>
              <a href="products.html" class="admin-sidebar-nav-link">
                <span class="admin-sidebar-nav-icon">📦</span>
                <span>Products</span>
              </a>
            </li>
            <li>
              <a href="orders.html" class="admin-sidebar-nav-link active">
                <span class="admin-sidebar-nav-icon">🛒</span>
                <span>Orders</span>
              </a>
            </li>
          </ul>
        </nav>
        
        <div class="admin-sidebar-footer">
          <button id="logoutBtn" class="admin-sidebar-logout">
            <span class="admin-sidebar-nav-icon">🚪</span>
            <span>Logout</span>
          </button>
        </div>
      </div>
      
      <!-- Admin Content -->
      <div class="admin-content">
        <div class="admin-header">
          <h1 class="admin-header-title">Manage Orders</h1>
        </div>
        
        <div class="admin-products-actions">
          <div class="admin-products-search">
            <input type="text" id="searchInput" placeholder="Search by order ID or customer name..." class="admin-products-search-input">
          </div>
          
          <div class="admin-products-category-filter">
            <label for="statusFilter">Status:</label>
            <select id="statusFilter" class="admin-filter-select">
              <option value="all">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="processing">Processing</option>
              <option value="completed">Completed</option>
              <option value="canceled">Canceled</option>
            </select>
          </div>
        </div>
        
        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Date</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersTable">
              <!-- Orders will be loaded dynamically -->
              <tr>
                <td colspan="6" class="admin-table-empty">Loading orders...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- Order Details Modal -->
      <div id="orderModal" class="admin-modal">
        <div class="admin-modal-content">
          <div class="admin-modal-header">
            <h2 id="orderModalTitle" class="admin-modal-title">Order Details</h2>
            <button id="closeOrderModalBtn" class="admin-modal-close">&times;</button>
          </div>
          <div class="admin-modal-body">
            <div id="orderDetails">
              <!-- Order details will be loaded dynamically -->
            </div>
          </div>
          <div class="admin-modal-footer">
            <button type="button" id="closeOrderDetailsBtn" class="btn btn-outline">Close</button>
            <div id="orderStatusActions">
              <!-- Status action buttons will be loaded dynamically -->
            </div>
          </div>
        </div>
      </div>
      
      <!-- Overlay -->
      <div id="overlay" class="overlay"></div>
      
      <!-- Toast Notifications -->
      <div id="toast" class="toast"></div>
    </div>

    <script src="../js/database.js"></script>
    <script src="admin.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Check admin authentication
        if (!checkAdminAuth()) return;
        
        // DOM elements
        const ordersTable = document.getElementById('ordersTable');
        const searchInput = document.getElementById('searchInput');
        const statusFilter = document.getElementById('statusFilter');
        const logoutBtn = document.getElementById('logoutBtn');
        
        // Order modal elements
        const orderModal = document.getElementById('orderModal');
        const orderModalTitle = document.getElementById('orderModalTitle');
        const orderDetails = document.getElementById('orderDetails');
        const orderStatusActions = document.getElementById('orderStatusActions');
        const closeOrderModalBtn = document.getElementById('closeOrderModalBtn');
        const closeOrderDetailsBtn = document.getElementById('closeOrderDetailsBtn');
        
        // Overlay
        const overlay = document.getElementById('overlay');
        
        // Initialize database
        initializeDb();
        
        // Load orders
        loadOrders();
        
        // Event listeners
        logoutBtn.addEventListener('click', adminLogout);
        searchInput.addEventListener('input', loadOrders);
        statusFilter.addEventListener('change', loadOrders);
        closeOrderModalBtn.addEventListener('click', closeOrderModal);
        closeOrderDetailsBtn.addEventListener('click', closeOrderModal);
        
        // Load orders
        function loadOrders() {
          const searchTerm = searchInput.value.toLowerCase();
          const statusValue = statusFilter.value;
          const allOrders = getAllOrders();
          
          let filteredOrders = allOrders.filter(order => {
            // Filter by search term
            const matchesSearch = order.id.toLowerCase().includes(searchTerm) || 
                                  order.customer.name.toLowerCase().includes(searchTerm);
            
            // Filter by status
            const matchesStatus = statusValue === 'all' || order.status === statusValue;
            
            return matchesSearch && matchesStatus;
          });
          
          if (filteredOrders.length === 0) {
            ordersTable.innerHTML = '<tr><td colspan="6" class="admin-table-empty">No orders found</td></tr>';
            return;
          }
          
          ordersTable.innerHTML = filteredOrders.map(order => `
            <tr>
              <td>#${order.id}</td>
              <td>${order.customer.name}</td>
              <td>${order.date}</td>
              <td>${formatPrice(order.total)}</td>
              <td><span class="admin-badge ${getStatusBadgeClass(order.status)}">${order.status}</span></td>
              <td>
                <button class="btn btn-outline btn-sm view-order-btn" data-id="${order.id}">View Details</button>
              </td>
            </tr>
          `).join('');
          
          // Add event listeners to view buttons
          document.querySelectorAll('.view-order-btn').forEach(button => {
            button.addEventListener('click', function() {
              const orderId = this.dataset.id;
              showOrderDetails(orderId);
            });
          });
        }
        
        // Show order details
        function showOrderDetails(orderId) {
          const allOrders = getAllOrders();
          const order = allOrders.find(order => order.id === orderId);
          
          if (!order) {
            showToast('Order not found', 'error');
            return;
          }
          
          orderModalTitle.textContent = `Order #${order.id}`;
          
          // Order details HTML
          orderDetails.innerHTML = `
            <div class="order-details">
              <div class="order-section">
                <h3>Customer Information</h3>
                <p><strong>Name:</strong> ${order.customer.name}</p>
                <p><strong>Email:</strong> ${order.customer.email}</p>
                <p><strong>Phone:</strong> ${order.customer.phone}</p>
                <p><strong>Address:</strong> ${order.customer.address}</p>
              </div>
              
              <div class="order-section">
                <h3>Order Information</h3>
                <p><strong>Order Date:</strong> ${order.date}</p>
                <p><strong>Status:</strong> <span class="admin-badge ${getStatusBadgeClass(order.status)}">${order.status}</span></p>
              </div>
              
              <div class="order-section">
                <h3>Order Items</h3>
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th>Product</th>
                      <th>Quantity</th>
                      <th>Price</th>
                      <th>Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${order.items.map(item => `
                      <tr>
                        <td class="admin-table-product">
                          <img src="${item.image}" alt="${item.name}" class="admin-table-product-image">
                          ${item.name}
                        </td>
                        <td>${item.quantity}</td>
                        <td>${formatPrice(item.price)}</td>
                        <td>${formatPrice(item.price * item.quantity)}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
              
              <div class="order-section">
                <h3>Order Summary</h3>
                <div class="order-summary">
                  <div class="order-summary-row">
                    <span>Subtotal:</span>
                    <span>${formatPrice(order.total - 15)}</span>
                  </div>
                  <div class="order-summary-row">
                    <span>Shipping:</span>
                    <span>15.00 RON</span>
                  </div>
                  <div class="order-summary-row total">
                    <span>Total:</span>
                    <span>${formatPrice(order.total)}</span>
                  </div>
                </div>
              </div>
            </div>
          `;
          
          // Status action buttons
          renderStatusActionButtons(order);
          
          // Show modal
          orderModal.classList.add('active');
          overlay.classList.add('active');
        }
        
        // Render status action buttons
        function renderStatusActionButtons(order) {
          const buttons = [];
          
          // Generate buttons based on current status
          switch (order.status) {
            case 'pending':
              buttons.push({
                status: 'processing',
                label: 'Mark as Processing',
                class: 'btn-outline'
              });
              buttons.push({
                status: 'canceled',
                label: 'Cancel Order',
                class: 'btn-outline'
              });
              break;
              
            case 'processing':
              buttons.push({
                status: 'completed',
                label: 'Mark as Completed',
                class: 'btn-primary'
              });
              buttons.push({
                status: 'canceled',
                label: 'Cancel Order',
                class: 'btn-outline'
              });
              break;
              
            case 'completed':
              // No actions for completed orders
              break;
              
            case 'canceled':
              buttons.push({
                status: 'pending',
                label: 'Reactivate Order',
                class: 'btn-outline'
              });
              break;
          }
          
          // Render buttons
          orderStatusActions.innerHTML = buttons.map(button => `
            <button type="button" class="btn ${button.class} update-status-btn" data-id="${order.id}" data-status="${button.status}">${button.label}</button>
          `).join('');
          
          // Add event listeners to status buttons
          document.querySelectorAll('.update-status-btn').forEach(button => {
            button.addEventListener('click', function() {
              const orderId = this.dataset.id;
              const newStatus = this.dataset.status;
              updateOrderStatus(orderId, newStatus);
              closeOrderModal();
              loadOrders();
            });
          });
        }
        
        // Close order modal
        function closeOrderModal() {
          orderModal.classList.remove('active');
          overlay.classList.remove('active');
        }
      });
    </script>
    <style>
      .order-details {
        max-width: 100%;
      }
      
      .order-section {
        margin-bottom: var(--spacing-lg);
      }
      
      .order-section h3 {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: var(--spacing-sm);
        padding-bottom: var(--spacing-xs);
        border-bottom: 1px solid var(--border);
      }
      
      .order-summary {
        margin-top: var(--spacing-md);
      }
      
      .order-summary-row {
        display: flex;
        justify-content: space-between;
        padding: var(--spacing-xs) 0;
      }
      
      .order-summary-row.total {
        font-weight: 700;
        font-size: 1.1rem;
        border-top: 1px solid var(--border);
        margin-top: var(--spacing-sm);
        padding-top: var(--spacing-sm);
      }
    </style>
  </body>
</html>
